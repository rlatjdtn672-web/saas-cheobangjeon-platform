<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #faf8ef;
    font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    user-select: none;
  }

  h1 {
    font-size: 60px;
    font-weight: 700;
    color: #776e65;
    line-height: 1;
    margin-bottom: 8px;
  }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    width: 480px;
    margin-bottom: 12px;
  }

  .scores {
    display: flex;
    gap: 8px;
  }

  .score-box {
    background: #bbada0;
    border-radius: 6px;
    padding: 8px 16px;
    text-align: center;
    min-width: 80px;
  }

  .score-label {
    font-size: 11px;
    font-weight: 700;
    color: #eee4da;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .score-value {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
  }

  .score-add {
    position: absolute;
    font-size: 18px;
    font-weight: 700;
    color: #776e65;
    animation: scoreFloat 0.6s ease-out forwards;
    pointer-events: none;
    z-index: 100;
  }

  @keyframes scoreFloat {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
  }

  .controls {
    display: flex;
    gap: 8px;
  }

  button {
    background: #8f7a66;
    color: #f9f6f2;
    border: none;
    border-radius: 6px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }

  button:hover { background: #7a6655; }

  .sub-header {
    width: 480px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .subtitle {
    font-size: 14px;
    color: #776e65;
    font-weight: 600;
  }

  .grid-wrapper {
    position: relative;
    width: 480px;
    height: 480px;
  }

  .grid-bg {
    position: absolute;
    inset: 0;
    background: #bbada0;
    border-radius: 8px;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .cell-bg {
    background: rgba(238, 228, 218, 0.35);
    border-radius: 4px;
  }

  .tile-layer {
    position: absolute;
    inset: 12px;
  }

  .tile {
    position: absolute;
    width: calc(25% - 9px);
    height: calc(25% - 9px);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 36px;
    transition: left 0.1s ease, top 0.1s ease;
    will-change: left, top, transform;
  }

  .tile.new {
    animation: tileAppear 0.15s ease-out;
  }

  .tile.merged {
    animation: tileMerge 0.2s ease-out;
    z-index: 10;
  }

  @keyframes tileAppear {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); }
  }

  @keyframes tileMerge {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .t2    { background: #eee4da; color: #776e65; }
  .t4    { background: #ede0c8; color: #776e65; }
  .t8    { background: #f2b179; color: #f9f6f2; }
  .t16   { background: #f59563; color: #f9f6f2; }
  .t32   { background: #f67c5f; color: #f9f6f2; }
  .t64   { background: #f65e3b; color: #f9f6f2; }
  .t128  { background: #edcf72; color: #f9f6f2; font-size: 30px; }
  .t256  { background: #edcc61; color: #f9f6f2; font-size: 30px; }
  .t512  { background: #edc850; color: #f9f6f2; font-size: 30px; }
  .t1024 { background: #edc53f; color: #f9f6f2; font-size: 24px; }
  .t2048 { background: #edc22e; color: #f9f6f2; font-size: 24px; }
  .tbig  { background: #3c3a32; color: #f9f6f2; font-size: 18px; }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(238, 228, 218, 0.73);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 50;
    animation: overlayIn 0.3s ease;
  }

  @keyframes overlayIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .overlay h2 {
    font-size: 48px;
    font-weight: 700;
    color: #776e65;
  }

  .overlay p {
    font-size: 16px;
    color: #776e65;
    text-align: center;
  }

  .overlay button {
    font-size: 16px;
    padding: 12px 24px;
  }

  .instructions {
    width: 480px;
    margin-top: 16px;
    font-size: 13px;
    color: #776e65;
    line-height: 1.6;
  }
</style>
</head>
<body tabindex="0">

<div class="header">
  <h1>2048</h1>
  <div class="scores">
    <div class="score-box" id="scoreBox">
      <div class="score-label">Score</div>
      <div class="score-value" id="scoreVal">0</div>
    </div>
    <div class="score-box" id="bestBox">
      <div class="score-label">Best</div>
      <div class="score-value" id="bestVal">0</div>
    </div>
  </div>
</div>

<div class="sub-header">
  <div class="subtitle">Join tiles, get to <strong>2048!</strong></div>
  <div class="controls">
    <button id="undoBtn">Undo (U)</button>
    <button id="newBtn">New Game</button>
  </div>
</div>

<div class="grid-wrapper" id="gridWrapper">
  <div class="grid-bg" id="gridBg"></div>
  <div class="tile-layer" id="tileLayer"></div>
</div>

<div class="instructions">
  <strong>HOW TO PLAY:</strong> Use arrow keys to slide tiles. Tiles with the same number merge into one.
  Press <strong>U</strong> or click <strong>Undo</strong> to revert the last move.
</div>

<script>
(function() {
  'use strict';

  const GRID = 4;
  const GAP = 12;
  const CELL_PCT = 25;

  let board, score, tiles, nextId;
  let prevBoard, prevScore, prevTiles, canUndo;
  let won, over;

  const tileLayer = document.getElementById('tileLayer');
  const scoreVal  = document.getElementById('scoreVal');
  const bestVal   = document.getElementById('bestVal');
  const gridBg    = document.getElementById('gridBg');
  const gridWrapper= document.getElementById('gridWrapper');

  // Build background cells
  for (let i = 0; i < GRID * GRID; i++) {
    const c = document.createElement('div');
    c.className = 'cell-bg';
    gridBg.appendChild(c);
  }

  function cellSize() {
    // layer is inset 12px on each side, so width = 480 - 24 = 456
    return (456 - GAP * (GRID - 1)) / GRID;
  }

  function tilePos(idx) {
    const cs = cellSize();
    return idx * (cs + GAP);
  }

  function colorClass(v) {
    if (v > 2048) return 'tbig';
    return 't' + v;
  }

  // --- State helpers ---

  function emptyBoard() {
    return Array.from({length: GRID}, () => Array(GRID).fill(0));
  }

  function cloneBoard(b) {
    return b.map(r => r.slice());
  }

  function cloneTiles(ts) {
    return ts.map(t => Object.assign({}, t));
  }

  function getBest() {
    return parseInt(localStorage.getItem('2048best') || '0', 10);
  }

  function saveBest(s) {
    if (s > getBest()) localStorage.setItem('2048best', s);
  }

  function updateScoreUI() {
    scoreVal.textContent = score;
    const b = getBest();
    bestVal.textContent = b;
  }

  // --- Tile DOM management ---

  // Map from id -> DOM element
  const domTiles = {};

  function createTileDom(t) {
    const el = document.createElement('div');
    el.className = `tile ${colorClass(t.value)}`;
    el.textContent = t.value;
    const cs = cellSize();
    el.style.width  = cs + 'px';
    el.style.height = cs + 'px';
    el.style.left   = tilePos(t.col) + 'px';
    el.style.top    = tilePos(t.row) + 'px';
    tileLayer.appendChild(el);
    domTiles[t.id] = el;
    return el;
  }

  function removeTileDom(id) {
    const el = domTiles[id];
    if (el) { el.remove(); delete domTiles[id]; }
  }

  function clearAllDom() {
    Object.keys(domTiles).forEach(id => { domTiles[id].remove(); delete domTiles[id]; });
  }

  function renderFromState() {
    clearAllDom();
    tiles.forEach(t => createTileDom(t));
  }

  // --- Spawn tile ---

  function emptyCells() {
    const cells = [];
    for (let r = 0; r < GRID; r++)
      for (let c = 0; c < GRID; c++)
        if (board[r][c] === 0) cells.push({row: r, col: c});
    return cells;
  }

  function spawnTile(animate) {
    const cells = emptyCells();
    if (!cells.length) return;
    const {row, col} = cells[Math.floor(Math.random() * cells.length)];
    const value = Math.random() < 0.9 ? 2 : 4;
    board[row][col] = value;
    const t = {id: nextId++, row, col, value};
    tiles.push(t);
    const el = createTileDom(t);
    if (animate) {
      el.classList.add('new');
      el.addEventListener('animationend', () => el.classList.remove('new'), {once: true});
    }
  }

  // --- Move logic ---

  // Returns {newLine, gained, moved}
  // Each cell: {value, id}
  function slideLine(line) {
    // filter non-zero
    const vals = line.filter(c => c.value !== 0);
    const merged = Array(vals.length).fill(false);
    let gained = 0;
    let moved = false;

    for (let i = 0; i < vals.length - 1; i++) {
      if (!merged[i] && vals[i].value === vals[i+1].value && !merged[i+1]) {
        vals[i] = {value: vals[i].value * 2, id: vals[i].id, mergedFrom: vals[i+1].id};
        vals[i+1] = null;
        merged[i] = true;
        gained += vals[i].value;
      }
    }

    const result = vals.filter(v => v !== null);

    // pad to GRID length
    while (result.length < GRID) result.push({value: 0, id: null});

    return {newLine: result, gained, moved};
  }

  function applyMove(dir) {
    // Save state for undo
    prevBoard = cloneBoard(board);
    prevScore = score;
    prevTiles = cloneTiles(tiles);

    let totalGained = 0;
    let anyMoved = false;
    const toRemove = [];
    const toMerge  = [];

    // Process each row or column
    for (let i = 0; i < GRID; i++) {
      // Extract line of {value, id}
      let line = [];
      for (let j = 0; j < GRID; j++) {
        let row, col;
        if (dir === 'left')  { row = i; col = j; }
        if (dir === 'right') { row = i; col = GRID-1-j; }
        if (dir === 'up')    { row = j; col = i; }
        if (dir === 'down')  { row = GRID-1-j; col = i; }

        const val = board[row][col];
        if (val !== 0) {
          const tileObj = tiles.find(t => t.row === row && t.col === col);
          line.push({value: val, id: tileObj ? tileObj.id : null, origRow: row, origCol: col});
        } else {
          line.push({value: 0, id: null, origRow: row, origCol: col});
        }
      }

      const {newLine, gained} = slideLine(line);
      totalGained += gained;

      // Apply back to board and move tile objects
      for (let j = 0; j < GRID; j++) {
        let row, col;
        if (dir === 'left')  { row = i; col = j; }
        if (dir === 'right') { row = i; col = GRID-1-j; }
        if (dir === 'up')    { row = j; col = i; }
        if (dir === 'down')  { row = GRID-1-j; col = i; }

        const cell = newLine[j];
        board[row][col] = cell.value;

        if (cell.value !== 0 && cell.id !== null) {
          const tileObj = tiles.find(t => t.id === cell.id);
          if (tileObj) {
            if (tileObj.row !== row || tileObj.col !== col) anyMoved = true;
            tileObj.row = row;
            tileObj.col = col;
            tileObj.value = cell.value;

            if (cell.mergedFrom !== undefined) {
              toMerge.push(cell.id);
              toRemove.push(cell.mergedFrom);
            }
          }
        }
      }
    }

    // Check if board actually changed
    const boardChanged = anyMoved || toRemove.length > 0;
    if (!boardChanged) {
      // Revert
      prevBoard = prevTiles = null;
      canUndo = false;
      return false;
    }

    canUndo = true;
    score += totalGained;
    saveBest(score);
    updateScoreUI();

    if (totalGained > 0) showScoreAdd(totalGained);

    // Animate tiles moving
    tiles.forEach(t => {
      const el = domTiles[t.id];
      if (el) {
        el.style.left = tilePos(t.col) + 'px';
        el.style.top  = tilePos(t.row) + 'px';
      }
    });

    // After transition, update merged tile appearance and remove consumed
    setTimeout(() => {
      toRemove.forEach(id => {
        removeTileDom(id);
        const idx = tiles.findIndex(t => t.id === id);
        if (idx !== -1) tiles.splice(idx, 1);
      });

      toMerge.forEach(id => {
        const tileObj = tiles.find(t => t.id === id);
        const el = domTiles[id];
        if (tileObj && el) {
          el.className = `tile ${colorClass(tileObj.value)} merged`;
          el.textContent = tileObj.value;
          el.addEventListener('animationend', () => el.classList.remove('merged'), {once: true});
        }
      });

      spawnTile(true);
      checkWin();
      checkOver();
    }, 110);

    return true;
  }

  // --- Win / Over detection ---

  function checkWin() {
    if (won) return;
    for (let r = 0; r < GRID; r++)
      for (let c = 0; c < GRID; c++)
        if (board[r][c] === 2048) { won = true; showOverlay('win'); return; }
  }

  function checkOver() {
    if (emptyCells().length > 0) return;
    // check merges possible
    for (let r = 0; r < GRID; r++) {
      for (let c = 0; c < GRID; c++) {
        if (c < GRID-1 && board[r][c] === board[r][c+1]) return;
        if (r < GRID-1 && board[r][c] === board[r+1][c]) return;
      }
    }
    over = true;
    setTimeout(() => showOverlay('over'), 200);
  }

  // --- Overlays ---

  let overlayEl = null;

  function showOverlay(type) {
    if (overlayEl) overlayEl.remove();
    overlayEl = document.createElement('div');
    overlayEl.className = 'overlay';

    if (type === 'win') {
      overlayEl.innerHTML = `
        <h2>You Win!</h2>
        <p>You reached <strong>2048</strong>! Keep going?</p>
        <div style="display:flex;gap:10px">
          <button id="keepGoingBtn">Keep Going</button>
          <button id="overlayNewBtn">New Game</button>
        </div>`;
    } else {
      overlayEl.innerHTML = `
        <h2>Game Over!</h2>
        <p>No more moves available.</p>
        <button id="overlayNewBtn">New Game</button>`;
    }

    gridWrapper.appendChild(overlayEl);

    overlayEl.querySelector('#overlayNewBtn')?.addEventListener('click', () => { startGame(); });
    overlayEl.querySelector('#keepGoingBtn')?.addEventListener('click', () => {
      won = false; // allow keep going
      overlayEl.remove(); overlayEl = null;
    });
  }

  function hideOverlay() {
    if (overlayEl) { overlayEl.remove(); overlayEl = null; }
  }

  // --- Score float animation ---

  function showScoreAdd(n) {
    const sb = document.getElementById('scoreBox');
    const rect = sb.getBoundingClientRect();
    const bodyRect = document.body.getBoundingClientRect();
    const el = document.createElement('div');
    el.className = 'score-add';
    el.textContent = '+' + n;
    el.style.left = (rect.left - bodyRect.left + rect.width/2) + 'px';
    el.style.top  = (rect.top  - bodyRect.top) + 'px';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  // --- Undo ---

  function undo() {
    if (!canUndo || !prevBoard) return;
    board = prevBoard;
    score = prevScore;
    tiles = prevTiles;
    canUndo = false;
    prevBoard = prevTiles = null;
    won  = false;
    over = false;
    hideOverlay();
    updateScoreUI();
    renderFromState();
  }

  // --- Init ---

  function startGame() {
    board   = emptyBoard();
    score   = 0;
    tiles   = [];
    nextId  = 1;
    canUndo = false;
    won     = false;
    over    = false;
    prevBoard = prevTiles = null;

    hideOverlay();
    clearAllDom();
    updateScoreUI();
    bestVal.textContent = getBest();

    spawnTile(false);
    spawnTile(false);
  }

  // --- Input ---

  const dirMap = {
    ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down'
  };

  document.body.addEventListener('keydown', e => {
    if (e.key === 'u' || e.key === 'U') { e.preventDefault(); undo(); return; }
    const dir = dirMap[e.key];
    if (!dir) return;
    e.preventDefault();
    if (over) return;
    applyMove(dir);
  });

  document.getElementById('undoBtn').addEventListener('click', undo);
  document.getElementById('newBtn').addEventListener('click', startGame);

  // Touch support
  let touchStartX, touchStartY;
  gridWrapper.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, {passive: true});
  gridWrapper.addEventListener('touchend', e => {
    if (over) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) applyMove(dx > 0 ? 'right' : 'left');
    else applyMove(dy > 0 ? 'down' : 'up');
  }, {passive: true});

  // Start
  document.body.focus();
  startGame();
})();
</script>
</body>
</html>
