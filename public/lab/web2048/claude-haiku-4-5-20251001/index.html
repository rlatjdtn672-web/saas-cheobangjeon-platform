<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 20px;
            max-width: 420px;
            width: 100%;
            outline: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            gap: 20px;
        }

        .title {
            font-size: 48px;
            font-weight: 900;
            color: #667eea;
            line-height: 1;
        }

        .score-section {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .score-box {
            background: #eee;
            border-radius: 6px;
            padding: 10px 15px;
            text-align: center;
            min-width: 80px;
        }

        .score-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .score-value {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .button:active {
            transform: scale(0.98);
        }

        .button-primary {
            background: #667eea;
            color: white;
        }

        .button-primary:hover {
            background: #5568d3;
        }

        .button-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .button-secondary:hover {
            background: #e0e0e0;
        }

        .game-board {
            background: #bbada0;
            border-radius: 6px;
            padding: 10px;
            aspect-ratio: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .game-cell {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
            position: relative;
        }

        .tile {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            font-weight: bold;
            color: #fff;
            user-select: none;
            transition: all 0.1s ease-out;
            pointer-events: none;
        }

        .tile.new-tile {
            animation: spawn 0.15s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes spawn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 30px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 30px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 30px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 25px; }
        .tile-2048 { background: #edc22e; color: #776e65; font-size: 25px; font-weight: 900; }
        .tile-4096 { background: #3c3322; color: #f9f6f2; font-size: 20px; }
        .tile-8192 { background: #3c3322; color: #f9f6f2; font-size: 20px; }
        .tile-16384 { background: #2c2416; color: #f9f6f2; font-size: 16px; }
        .tile-32768 { background: #2c2416; color: #f9f6f2; font-size: 16px; }

        .status-message {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            min-height: 28px;
            color: #333;
        }

        .status-message.win {
            color: #667eea;
            font-size: 20px;
        }

        .status-message.game-over {
            color: #e74c3c;
            font-size: 20px;
        }

        .instructions {
            background: #f0f0f0;
            border-radius: 6px;
            padding: 12px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .instructions strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="game-container" tabindex="0">
        <div class="header">
            <div class="title">2048</div>
            <div class="score-section">
                <div class="score-box">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">Best</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="button button-primary" id="new-game-btn">New Game</button>
            <button class="button button-secondary" id="undo-btn">Undo (U)</button>
        </div>

        <div class="status-message" id="status"></div>

        <div class="game-board" id="game-board">
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
            <div class="game-cell"></div>
        </div>

        <div class="instructions">
            <strong>How to play:</strong> Use arrow keys to move tiles. Combine tiles with the same number to reach 2048! Press <strong>U</strong> to undo the last move.
        </div>
    </div>

    <script>
        class Tile {
            static nextId = 1;
            constructor(value, row, col) {
                this.id = Tile.nextId++;
                this.value = value;
                this.row = row;
                this.col = col;
                this.isNew = true;
                this.wasMergedThisMove = false;
            }

            clone() {
                const cloned = new Tile(this.value, this.row, this.col);
                cloned.id = this.id;
                cloned.isNew = this.isNew;
                cloned.wasMergedThisMove = this.wasMergedThisMove;
                return cloned;
            }
        }

        class Game2048 {
            constructor() {
                this.size = 4;
                this.tiles = [];
                this.score = 0;
                this.gameWon = false;
                this.gameOver = false;
                this.history = [];
                this.bestScore = parseInt(localStorage.getItem('bestScore2048') || '0', 10);

                this.boardElement = document.getElementById('game-board');
                this.scoreElement = document.getElementById('score');
                this.bestScoreElement = document.getElementById('best-score');
                this.statusElement = document.getElementById('status');
                this.newGameBtn = document.getElementById('new-game-btn');
                this.undoBtn = document.getElementById('undo-btn');
                this.gameContainer = document.querySelector('.game-container');

                this.tileElements = new Map();

                this.newGameBtn.addEventListener('click', () => this.newGame());
                this.undoBtn.addEventListener('click', () => this.undo());
                this.gameContainer.addEventListener('keydown', (e) => this.handleKeyPress(e));

                this.bestScoreElement.textContent = this.bestScore;
                this.gameContainer.focus();
                this.newGame();
            }

            newGame() {
                this.tiles = [];
                this.score = 0;
                this.gameWon = false;
                this.gameOver = false;
                this.history = [];
                Tile.nextId = 1;
                this.scoreElement.textContent = '0';
                this.statusElement.textContent = '';
                this.statusElement.className = '';
                this.clearBoard();
                this.addNewTile();
                this.addNewTile();
                this.render();
            }

            saveState() {
                this.history.push({
                    tiles: this.tiles.map(t => t.clone()),
                    score: this.score,
                    gameWon: this.gameWon,
                    gameOver: this.gameOver
                });
            }

            undo() {
                if (this.history.length === 0) return;

                const state = this.history.pop();
                this.tiles = state.tiles;
                this.score = state.score;
                this.gameWon = state.gameWon;
                this.gameOver = state.gameOver;

                this.scoreElement.textContent = this.score;
                this.statusElement.textContent = '';
                this.statusElement.className = '';

                this.render();
                this.gameContainer.focus();
            }

            clearBoard() {
                this.tileElements.forEach(el => el.remove());
                this.tileElements.clear();
            }

            addNewTile() {
                const occupied = new Set(this.tiles.map(t => `${t.row},${t.col}`));
                const empty = [];

                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (!occupied.has(`${r},${c}`)) {
                            empty.push([r, c]);
                        }
                    }
                }

                if (empty.length === 0) return;

                const [r, c] = empty[Math.floor(Math.random() * empty.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                const tile = new Tile(value, r, c);
                tile.isNew = true;
                this.tiles.push(tile);
            }

            getTile(row, col) {
                return this.tiles.find(t => t.row === row && t.col === col);
            }

            move(direction) {
                if (this.gameWon || this.gameOver) return;

                this.saveState();

                this.tiles.forEach(t => {
                    t.wasMergedThisMove = false;
                    t.isNew = false;
                });

                if (direction === 'left') this.moveHorizontal(false);
                else if (direction === 'right') this.moveHorizontal(true);
                else if (direction === 'up') this.moveVertical(false);
                else if (direction === 'down') this.moveVertical(true);

                const boardChanged = this.history.length === 0 ||
                    !this.statesEqual(this.history[this.history.length - 1].tiles, this.tiles);

                if (boardChanged) {
                    this.addNewTile();
                    this.checkWin();
                    if (!this.gameWon) {
                        this.checkGameOver();
                    }
                }

                this.render();
                this.gameContainer.focus();
            }

            statesEqual(tiles1, tiles2) {
                if (tiles1.length !== tiles2.length) return false;

                const sorted1 = tiles1.sort((a, b) => a.row !== b.row ? a.row - b.row : a.col - b.col);
                const sorted2 = tiles2.sort((a, b) => a.row !== b.row ? a.row - b.row : a.col - b.col);

                return sorted1.every((t, i) => t.value === sorted2[i].value && t.row === sorted2[i].row && t.col === sorted2[i].col);
            }

            moveHorizontal(isRight) {
                for (let r = 0; r < this.size; r++) {
                    const row = [];
                    for (let c = 0; c < this.size; c++) {
                        const tile = this.getTile(r, c);
                        if (tile) row.push(tile);
                    }

                    if (isRight) row.reverse();
                    this.mergeRow(row);
                    if (isRight) row.reverse();

                    for (let c = 0; c < this.size; c++) {
                        if (c < row.length) {
                            row[c].row = r;
                            row[c].col = c;
                        }
                    }
                }
            }

            moveVertical(isDown) {
                for (let c = 0; c < this.size; c++) {
                    const col = [];
                    for (let r = 0; r < this.size; r++) {
                        const tile = this.getTile(r, c);
                        if (tile) col.push(tile);
                    }

                    if (isDown) col.reverse();
                    this.mergeRow(col);
                    if (isDown) col.reverse();

                    for (let r = 0; r < this.size; r++) {
                        if (r < col.length) {
                            col[r].row = r;
                            col[r].col = c;
                        }
                    }
                }
            }

            mergeRow(tiles) {
                for (let i = 0; i < tiles.length - 1; i++) {
                    const current = tiles[i];
                    const next = tiles[i + 1];

                    if (current.value === next.value && !current.wasMergedThisMove && !next.wasMergedThisMove) {
                        current.value *= 2;
                        current.wasMergedThisMove = true;
                        this.score += current.value;

                        this.tiles = this.tiles.filter(t => t.id !== next.id);
                        tiles.splice(i + 1, 1);
                        i++;
                    }
                }
            }

            checkWin() {
                for (const tile of this.tiles) {
                    if (tile.value === 2048) {
                        this.gameWon = true;
                        this.statusElement.textContent = '🎉 You reached 2048!';
                        this.statusElement.className = 'win';
                        return;
                    }
                }
            }

            checkGameOver() {
                if (this.tiles.length < 16) return;

                const occupied = new Set(this.tiles.map(t => `${t.row},${t.col}`));

                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        const tile = this.getTile(r, c);
                        if (!tile) return;

                        if (c < this.size - 1) {
                            const right = this.getTile(r, c + 1);
                            if (right && tile.value === right.value) return;
                        }

                        if (r < this.size - 1) {
                            const below = this.getTile(r + 1, c);
                            if (below && tile.value === below.value) return;
                        }
                    }
                }

                this.gameOver = true;
                this.statusElement.textContent = 'Game Over!';
                this.statusElement.className = 'game-over';
            }

            getCellPosition(row, col) {
                const cell = this.boardElement.children[row * this.size + col];
                const rect = cell.getBoundingClientRect();
                const boardRect = this.boardElement.getBoundingClientRect();
                return {
                    left: rect.left - boardRect.left,
                    top: rect.top - boardRect.top,
                    width: rect.width,
                    height: rect.height
                };
            }

            render() {
                this.scoreElement.textContent = this.score;

                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    this.bestScoreElement.textContent = this.bestScore;
                    localStorage.setItem('bestScore2048', this.bestScore);
                }

                const pos = this.getCellPosition(0, 0);
                const cellSize = pos.width;
                const gap = 10;

                this.tiles.forEach(tile => {
                    let element = this.tileElements.get(tile.id);

                    if (!element) {
                        element = document.createElement('div');
                        element.className = `tile tile-${tile.value}`;
                        if (tile.isNew) element.classList.add('new-tile');
                        this.boardElement.appendChild(element);
                        this.tileElements.set(tile.id, element);
                    } else {
                        element.textContent = tile.value;
                        element.className = `tile tile-${tile.value}`;
                    }

                    const x = tile.col * (cellSize + gap);
                    const y = tile.row * (cellSize + gap);
                    element.style.left = x + 'px';
                    element.style.top = y + 'px';
                    element.style.width = cellSize + 'px';
                    element.style.height = cellSize + 'px';
                });
            }

            handleKeyPress(e) {
                const key = e.key.toLowerCase();

                if (['arrowleft', 'arrowup', 'arrowright', 'arrowdown'].includes(key)) {
                    e.preventDefault();
                    const directionMap = {
                        'arrowleft': 'left',
                        'arrowup': 'up',
                        'arrowright': 'right',
                        'arrowdown': 'down'
                    };
                    this.move(directionMap[key]);
                } else if (key === 'u') {
                    e.preventDefault();
                    this.undo();
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new Game2048();
        });
    </script>
</body>
</html>
