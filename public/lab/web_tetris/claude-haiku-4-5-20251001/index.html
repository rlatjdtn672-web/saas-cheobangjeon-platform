<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            outline: none;
        }

        .container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            padding: 20px;
        }

        .game-info {
            color: white;
            font-size: 18px;
            text-align: center;
            min-width: 150px;
        }

        .game-info h1 {
            margin-bottom: 20px;
            font-size: 28px;
        }

        .score-display {
            margin: 15px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
        }

        .game-board {
            display: inline-grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(20, 30px);
            gap: 1px;
            background: #111;
            padding: 10px;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .cell {
            background: #222;
            border: 1px solid #333;
            position: relative;
        }

        .cell.filled {
            border-color: #555;
        }

        .controls {
            color: white;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
        }

        .controls p {
            margin: 5px 0;
        }

        .game-status {
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
            padding: 10px;
            border-radius: 5px;
            min-height: 20px;
        }

        .game-status.playing {
            color: #4CAF50;
        }

        .game-status.game-over {
            color: #f44336;
            background: rgba(244, 67, 54, 0.2);
        }
    </style>
</head>
<body tabindex="0">
    <div class="container">
        <div class="game-info">
            <h1>TETRIS</h1>
            <div class="score-display" id="score">Score: 0</div>
            <div class="game-status playing" id="status">Playing...</div>
            <div class="controls">
                <p><strong>← →</strong> Move</p>
                <p><strong>↓</strong> Soft Drop</p>
                <p><strong>↑</strong> Rotate</p>
                <p><strong>R</strong> Restart</p>
                <p style="margin-top: 10px; font-size: 12px; color: #aaa;">Click here to focus</p>
            </div>
        </div>
        <div class="game-board" id="gameBoard"></div>
    </div>

    <script>
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const CELL_SIZE = 30;

        const TETROMINOES = {
            I: { shape: [[1, 1, 1, 1]], color: '#00BCD4' },
            O: { shape: [[1, 1], [1, 1]], color: '#FFEB3B' },
            T: { shape: [[0, 1, 0], [1, 1, 1]], color: '#9C27B0' },
            S: { shape: [[0, 1, 1], [1, 1, 0]], color: '#4CAF50' },
            Z: { shape: [[1, 1, 0], [0, 1, 1]], color: '#F44336' },
            J: { shape: [[1, 0, 0], [1, 1, 1]], color: '#2196F3' },
            L: { shape: [[0, 0, 1], [1, 1, 1]], color: '#FF9800' }
        };

        class Game {
            constructor() {
                this.board = Array(BOARD_HEIGHT).fill(null).map(() => Array(BOARD_WIDTH).fill(null));
                this.currentPiece = null;
                this.currentPieceX = 0;
                this.currentPieceY = 0;
                this.score = 0;
                this.gameOver = false;
                this.dropSpeed = 1000;
                this.lastDropTime = 0;
                this.gameRunning = true;
                this.boardElement = document.getElementById('gameBoard');
                this.scoreElement = document.getElementById('score');
                this.statusElement = document.getElementById('status');

                this.initBoard();
                this.spawnPiece();
                this.startGameLoop();
                this.attachKeyListeners();
                document.body.focus();
            }

            initBoard() {
                this.boardElement.innerHTML = '';
                for (let y = 0; y < BOARD_HEIGHT; y++) {
                    for (let x = 0; x < BOARD_WIDTH; x++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.id = `cell-${y}-${x}`;
                        this.boardElement.appendChild(cell);
                    }
                }
            }

            render() {
                for (let y = 0; y < BOARD_HEIGHT; y++) {
                    for (let x = 0; x < BOARD_WIDTH; x++) {
                        const cell = document.getElementById(`cell-${y}-${x}`);
                        cell.style.background = this.board[y][x] || '#222';
                        cell.classList.toggle('filled', !!this.board[y][x]);
                    }
                }
                this.renderCurrentPiece();
            }

            renderCurrentPiece() {
                if (!this.currentPiece) return;

                const shape = this.currentPiece.shape;
                for (let y = 0; y < shape.length; y++) {
                    for (let x = 0; x < shape[y].length; x++) {
                        if (shape[y][x]) {
                            const boardX = this.currentPieceX + x;
                            const boardY = this.currentPieceY + y;
                            if (boardY >= 0 && boardY < BOARD_HEIGHT && boardX >= 0 && boardX < BOARD_WIDTH) {
                                const cell = document.getElementById(`cell-${boardY}-${boardX}`);
                                cell.style.background = this.currentPiece.color;
                                cell.classList.add('filled');
                            }
                        }
                    }
                }
            }

            spawnPiece() {
                const pieces = Object.entries(TETROMINOES);
                const [name, tetromino] = pieces[Math.floor(Math.random() * pieces.length)];
                this.currentPiece = {
                    shape: JSON.parse(JSON.stringify(tetromino.shape)),
                    color: tetromino.color
                };
                this.currentPieceX = Math.floor((BOARD_WIDTH - this.currentPiece.shape[0].length) / 2);
                this.currentPieceY = 0;

                if (this.collides()) {
                    this.endGame();
                }
            }

            collides(offsetX = 0, offsetY = 0, shape = null) {
                if (!this.currentPiece) return false;

                shape = shape || this.currentPiece.shape;
                const x = this.currentPieceX + offsetX;
                const y = this.currentPieceY + offsetY;

                for (let py = 0; py < shape.length; py++) {
                    for (let px = 0; px < shape[py].length; px++) {
                        if (shape[py][px]) {
                            const boardX = x + px;
                            const boardY = y + py;

                            if (boardX < 0 || boardX >= BOARD_WIDTH || boardY >= BOARD_HEIGHT) {
                                return true;
                            }

                            if (boardY >= 0 && this.board[boardY][boardX]) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            lockPiece() {
                if (!this.currentPiece) return;

                const shape = this.currentPiece.shape;
                for (let y = 0; y < shape.length; y++) {
                    for (let x = 0; x < shape[y].length; x++) {
                        if (shape[y][x]) {
                            const boardX = this.currentPieceX + x;
                            const boardY = this.currentPieceY + y;
                            if (boardY >= 0 && boardY < BOARD_HEIGHT && boardX >= 0 && boardX < BOARD_WIDTH) {
                                this.board[boardY][boardX] = this.currentPiece.color;
                            }
                        }
                    }
                }

                this.clearLines();
                this.currentPiece = null;
                this.spawnPiece();
            }

            clearLines() {
                let linesCleared = 0;
                for (let y = BOARD_HEIGHT - 1; y >= 0; y--) {
                    if (this.board[y].every(cell => cell !== null)) {
                        this.board.splice(y, 1);
                        this.board.unshift(Array(BOARD_WIDTH).fill(null));
                        linesCleared++;
                        y++;
                    }
                }
                if (linesCleared > 0) {
                    this.score += linesCleared * 100;
                    this.scoreElement.textContent = `Score: ${this.score}`;
                }
            }

            movePiece(dx, dy = 0) {
                if (this.gameOver || !this.currentPiece) return;

                if (!this.collides(dx, dy)) {
                    this.currentPieceX += dx;
                    this.currentPieceY += dy;
                    return true;
                }
                return false;
            }

            rotatePiece() {
                if (this.gameOver || !this.currentPiece) return;

                const originalShape = this.currentPiece.shape;
                const rotated = this.rotateShape(originalShape);

                if (!this.collides(0, 0, rotated)) {
                    this.currentPiece.shape = rotated;
                } else {
                    for (let offset of [-1, 1, -2, 2]) {
                        if (!this.collides(offset, 0, rotated)) {
                            this.currentPieceX += offset;
                            this.currentPiece.shape = rotated;
                            return;
                        }
                    }
                }
            }

            rotateShape(shape) {
                const rows = shape.length;
                const cols = shape[0].length;
                const rotated = Array(cols).fill(null).map(() => Array(rows).fill(0));

                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        rotated[x][rows - 1 - y] = shape[y][x];
                    }
                }
                return rotated;
            }

            drop() {
                if (this.gameOver) return;
                if (!this.movePiece(0, 1)) {
                    this.lockPiece();
                }
            }

            startGameLoop() {
                const gameLoop = () => {
                    if (this.gameRunning) {
                        const now = Date.now();
                        if (now - this.lastDropTime > this.dropSpeed) {
                            this.drop();
                            this.lastDropTime = now;
                        }
                        this.render();
                    }
                    requestAnimationFrame(gameLoop);
                };
                gameLoop();
            }

            attachKeyListeners() {
                document.addEventListener('keydown', (e) => {
                    if (!this.gameRunning) {
                        if (e.key.toLowerCase() === 'r') {
                            this.restart();
                        }
                        return;
                    }

                    switch(e.key) {
                        case 'ArrowLeft':
                            this.movePiece(-1);
                            break;
                        case 'ArrowRight':
                            this.movePiece(1);
                            break;
                        case 'ArrowDown':
                            this.movePiece(0, 1);
                            break;
                        case 'ArrowUp':
                            this.rotatePiece();
                            break;
                        case 'r':
                        case 'R':
                            if (this.gameOver) this.restart();
                            break;
                    }
                    e.preventDefault();
                });
            }

            endGame() {
                this.gameOver = true;
                this.gameRunning = false;
                this.statusElement.textContent = 'GAME OVER - Press R';
                this.statusElement.className = 'game-status game-over';
            }

            restart() {
                this.board = Array(BOARD_HEIGHT).fill(null).map(() => Array(BOARD_WIDTH).fill(null));
                this.score = 0;
                this.gameOver = false;
                this.gameRunning = true;
                this.lastDropTime = Date.now();
                this.scoreElement.textContent = `Score: 0`;
                this.statusElement.textContent = 'Playing...';
                this.statusElement.className = 'game-status playing';
                this.currentPiece = null;
                this.spawnPiece();
            }
        }

        const game = new Game();
    </script>
</body>
</html>
