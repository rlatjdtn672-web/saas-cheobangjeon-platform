<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0b0e14;
    color: #e6e6e6;
    font-family: "Segoe UI", Tahoma, sans-serif;
  }
  #wrap {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    outline: none;
    padding: 20px;
  }
  #board {
    background: #11151f;
    border: 3px solid #2a3142;
    border-radius: 6px;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
    display: block;
  }
  #panel {
    width: 200px;
  }
  h1 {
    margin: 0 0 16px;
    font-size: 34px;
    letter-spacing: 4px;
    color: #4fd1c5;
  }
  .label {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #8893a7;
    margin-top: 18px;
  }
  .value {
    font-size: 28px;
    font-weight: bold;
    margin-top: 2px;
  }
  #next {
    margin-top: 6px;
    background: #11151f;
    border: 2px solid #2a3142;
    border-radius: 4px;
  }
  .controls {
    margin-top: 24px;
    font-size: 13px;
    line-height: 1.7;
    color: #8893a7;
  }
  .controls b { color: #cbd5e1; }
  #overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(5,7,12,0.82);
    text-align: center;
  }
  #overlay h2 { font-size: 42px; margin: 0 0 8px; color: #f56565; }
  #overlay p { font-size: 18px; color: #cbd5e1; }
  #overlay.show { display: flex; }
</style>
</head>
<body>
<div id="wrap" tabindex="0">
  <canvas id="board" width="300" height="600"></canvas>
  <div id="panel">
    <h1>TETRIS</h1>
    <div class="label">Score</div>
    <div class="value" id="score">0</div>
    <div class="label">Lines</div>
    <div class="value" id="lines">0</div>
    <div class="label">Level</div>
    <div class="value" id="level">1</div>
    <div class="label">Next</div>
    <canvas id="next" width="120" height="120"></canvas>
    <div class="controls">
      <b>&larr; &rarr;</b> Move<br>
      <b>&darr;</b> Soft drop<br>
      <b>&uarr;</b> Rotate<br>
      <b>Space</b> Hard drop<br>
      <b>R</b> Restart
    </div>
  </div>
</div>

<div id="overlay">
  <h2>GAME OVER</h2>
  <p>Press <b>R</b> to play again</p>
</div>

<script>
(function () {
  "use strict";

  const COLS = 10;
  const ROWS = 20;
  const CELL = 30;

  const canvas = document.getElementById("board");
  const ctx = canvas.getContext("2d");
  const nextCanvas = document.getElementById("next");
  const nctx = nextCanvas.getContext("2d");

  const scoreEl = document.getElementById("score");
  const linesEl = document.getElementById("lines");
  const levelEl = document.getElementById("level");
  const overlay = document.getElementById("overlay");
  const wrap = document.getElementById("wrap");

  // Tetromino definitions (each rotation state as a list of [x,y] cells)
  const SHAPES = {
    I: { color: "#4dd0e1", cells: [[0,1],[1,1],[2,1],[3,1]] },
    O: { color: "#ffd54f", cells: [[1,0],[2,0],[1,1],[2,1]] },
    T: { color: "#ba68c8", cells: [[1,0],[0,1],[1,1],[2,1]] },
    S: { color: "#81c784", cells: [[1,0],[2,0],[0,1],[1,1]] },
    Z: { color: "#e57373", cells: [[0,0],[1,0],[1,1],[2,1]] },
    J: { color: "#64b5f6", cells: [[0,0],[0,1],[1,1],[2,1]] },
    L: { color: "#ffb74d", cells: [[2,0],[0,1],[1,1],[2,1]] }
  };
  const TYPES = Object.keys(SHAPES);

  let grid, current, next, score, lines, level, gameOver, dropTimer, dropInterval, lastTime;
  let bag = [];

  function newGrid() {
    const g = [];
    for (let r = 0; r < ROWS; r++) g.push(new Array(COLS).fill(null));
    return g;
  }

  function refillBag() {
    bag = TYPES.slice();
    for (let i = bag.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [bag[i], bag[j]] = [bag[j], bag[i]];
    }
  }

  function nextType() {
    if (bag.length === 0) refillBag();
    return bag.pop();
  }

  function spawn(type) {
    const def = SHAPES[type];
    return {
      type: type,
      color: def.color,
      cells: def.cells.map(c => [c[0], c[1]]),
      x: type === "I" || type === "O" ? 3 : 3,
      y: 0
    };
  }

  // Rotate cells 90deg clockwise within a bounding box.
  function rotated(piece) {
    if (piece.type === "O") return piece.cells.map(c => [c[0], c[1]]);
    // Determine bounding box size
    let maxX = 0, maxY = 0;
    for (const [cx, cy] of piece.cells) {
      if (cx > maxX) maxX = cx;
      if (cy > maxY) maxY = cy;
    }
    const size = Math.max(maxX, maxY) + 1;
    return piece.cells.map(([cx, cy]) => [size - 1 - cy, cx]);
  }

  function collides(piece, cells, offX, offY) {
    for (const [cx, cy] of cells) {
      const x = piece.x + cx + offX;
      const y = piece.y + cy + offY;
      if (x < 0 || x >= COLS || y >= ROWS) return true;
      if (y >= 0 && grid[y][x]) return true;
    }
    return false;
  }

  function lockPiece() {
    for (const [cx, cy] of current.cells) {
      const x = current.x + cx;
      const y = current.y + cy;
      if (y >= 0) grid[y][x] = current.color;
    }
    clearLines();
    current = next;
    next = spawn(nextType());
    if (collides(current, current.cells, 0, 0)) {
      endGame();
    }
  }

  function clearLines() {
    let cleared = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r].every(cell => cell)) {
        grid.splice(r, 1);
        grid.unshift(new Array(COLS).fill(null));
        cleared++;
        r++; // re-check same row index after shift
      }
    }
    if (cleared > 0) {
      const points = [0, 100, 300, 500, 800];
      score += points[cleared] * level;
      lines += cleared;
      level = Math.floor(lines / 10) + 1;
      dropInterval = Math.max(80, 1000 - (level - 1) * 90);
      updateHud();
    }
  }

  function move(dx, dy) {
    if (gameOver) return false;
    if (!collides(current, current.cells, dx, dy)) {
      current.x += dx;
      current.y += dy;
      return true;
    }
    return false;
  }

  function softDrop() {
    if (!move(0, 1)) {
      lockPiece();
    } else {
      score += 1;
      updateHud();
    }
    dropTimer = 0;
  }

  function hardDrop() {
    if (gameOver) return;
    let dist = 0;
    while (!collides(current, current.cells, 0, 1)) {
      current.y++;
      dist++;
    }
    score += dist * 2;
    updateHud();
    lockPiece();
    dropTimer = 0;
  }

  function rotate() {
    if (gameOver) return;
    const rc = rotated(current);
    // wall kicks
    const kicks = [0, -1, 1, -2, 2];
    for (const k of kicks) {
      if (!collides(current, rc, k, 0)) {
        current.cells = rc;
        current.x += k;
        return;
      }
    }
  }

  function updateHud() {
    scoreEl.textContent = score;
    linesEl.textContent = lines;
    levelEl.textContent = level;
  }

  function drawCell(c, x, y, color) {
    c.fillStyle = color;
    c.fillRect(x, y, CELL, CELL);
    c.fillStyle = "rgba(255,255,255,0.18)";
    c.fillRect(x, y, CELL, 4);
    c.fillStyle = "rgba(0,0,0,0.25)";
    c.fillRect(x, y + CELL - 4, CELL, 4);
    c.strokeStyle = "rgba(0,0,0,0.45)";
    c.lineWidth = 1;
    c.strokeRect(x + 0.5, y + 0.5, CELL - 1, CELL - 1);
  }

  function draw() {
    // background grid
    ctx.fillStyle = "#11151f";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "rgba(255,255,255,0.04)";
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath();
      ctx.moveTo(0, r * CELL);
      ctx.lineTo(canvas.width, r * CELL);
      ctx.stroke();
    }
    for (let col = 0; col <= COLS; col++) {
      ctx.beginPath();
      ctx.moveTo(col * CELL, 0);
      ctx.lineTo(col * CELL, canvas.height);
      ctx.stroke();
    }

    // settled blocks
    for (let r = 0; r < ROWS; r++) {
      for (let col = 0; col < COLS; col++) {
        if (grid[r][col]) drawCell(ctx, col * CELL, r * CELL, grid[r][col]);
      }
    }

    if (!gameOver) {
      // ghost piece
      let ghostY = 0;
      while (!collides(current, current.cells, 0, ghostY + 1)) ghostY++;
      ctx.globalAlpha = 0.22;
      for (const [cx, cy] of current.cells) {
        const x = (current.x + cx) * CELL;
        const y = (current.y + cy + ghostY) * CELL;
        if (current.y + cy + ghostY >= 0) drawCell(ctx, x, y, current.color);
      }
      ctx.globalAlpha = 1;

      // active piece
      for (const [cx, cy] of current.cells) {
        const x = (current.x + cx) * CELL;
        const y = (current.y + cy) * CELL;
        if (current.y + cy >= 0) drawCell(ctx, x, y, current.color);
      }
    }

    drawNext();
  }

  function drawNext() {
    nctx.fillStyle = "#11151f";
    nctx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
    const def = SHAPES[next.type];
    let maxX = 0, maxY = 0, minX = 99, minY = 99;
    for (const [cx, cy] of def.cells) {
      maxX = Math.max(maxX, cx); maxY = Math.max(maxY, cy);
      minX = Math.min(minX, cx); minY = Math.min(minY, cy);
    }
    const w = (maxX - minX + 1), h = (maxY - minY + 1);
    const cell = 26;
    const offX = (nextCanvas.width - w * cell) / 2 - minX * cell;
    const offY = (nextCanvas.height - h * cell) / 2 - minY * cell;
    for (const [cx, cy] of def.cells) {
      const x = offX + cx * cell;
      const y = offY + cy * cell;
      nctx.fillStyle = def.color;
      nctx.fillRect(x, y, cell, cell);
      nctx.fillStyle = "rgba(255,255,255,0.18)";
      nctx.fillRect(x, y, cell, 4);
      nctx.strokeStyle = "rgba(0,0,0,0.45)";
      nctx.strokeRect(x + 0.5, y + 0.5, cell - 1, cell - 1);
    }
  }

  function endGame() {
    gameOver = true;
    overlay.classList.add("show");
  }

  function reset() {
    grid = newGrid();
    bag = [];
    score = 0;
    lines = 0;
    level = 1;
    gameOver = false;
    dropInterval = 1000;
    dropTimer = 0;
    lastTime = performance.now();
    current = spawn(nextType());
    next = spawn(nextType());
    overlay.classList.remove("show");
    updateHud();
  }

  function loop(time) {
    const delta = time - lastTime;
    lastTime = time;
    if (!gameOver) {
      dropTimer += delta;
      if (dropTimer >= dropInterval) {
        dropTimer = 0;
        if (!move(0, 1)) lockPiece();
      }
    }
    draw();
    requestAnimationFrame(loop);
  }

  document.addEventListener("keydown", function (e) {
    const k = e.key;
    if (k === "r" || k === "R") {
      reset();
      e.preventDefault();
      return;
    }
    if (gameOver) return;
    switch (k) {
      case "ArrowLeft":  move(-1, 0); e.preventDefault(); break;
      case "ArrowRight": move(1, 0);  e.preventDefault(); break;
      case "ArrowDown":  softDrop();  e.preventDefault(); break;
      case "ArrowUp":    rotate();    e.preventDefault(); break;
      case " ":          hardDrop();  e.preventDefault(); break;
    }
  });

  // keep focus for keyboard input
  wrap.focus();
  window.addEventListener("load", () => wrap.focus());
  document.addEventListener("click", () => wrap.focus());

  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
